<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чеклист TikTok — SecureSocial</title>

    <link id="themeStylesheetDark" rel="stylesheet" href="assets/css/styles.css">
    <link id="themeStylesheetLight" rel="stylesheet" href="assets/css/styles-light.css" disabled>

    <style id="theme-bootstrap">
        html {
            background: #0a0b0e;
            color: #e4e5e9;
        }

            html[data-theme="light"] {
                background: #f8fafc;
                color: #334155;
            }

            html[data-theme="dark"] {
                background: #0a0b0e;
                color: #e4e5e9;
            }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 0;
            visibility: visible;
        }
    </style>

    <script>
        (function () {
            try {
                var theme = localStorage.getItem('site-theme');
                if (!theme && window.matchMedia) {
                    theme = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
                }
                if (!theme) theme = 'dark';
                document.documentElement.dataset.theme = theme;

                var darkLink = document.getElementById('themeStylesheetDark');
                var lightLink = document.getElementById('themeStylesheetLight');
                if (theme === 'light') {
                    if (darkLink) darkLink.disabled = true;
                    if (lightLink) lightLink.disabled = false;
                } else {
                    if (darkLink) darkLink.disabled = false;
                    if (lightLink) lightLink.disabled = true;
                }
            } catch (e) { }
        })();
    </script>
</head>
<body>
    <header>
        <div class="container nav-wrapper">
            <a href="index.html" class="logo">🛡️ <span>SecureSocial</span></a>
            <div class="nav-actions">
                <a href="ttSecure.html" class="btn-header">Назад к TT</a>
                <a href="index.html" class="back-btn">← На главную</a>
            </div>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <div class="platform-badge" style="--platform-color: var(--tt-color);">🎵 TikTok</div>
                <h1>Чеклист безопасности</h1>
                <p>Отмечайте пункты по мере выполнения защиты аккаунта.</p>
            </div>
        </section>

        <section class="checklist-section">
            <div class="container">
                <h2 class="section-title">TT-чеклист</h2>
                <p class="section-subtitle">Отмечайте пункты по мере выполнения.</p>
                <div class="checklist-progress">
                    <div class="progress-bar">
                        <div class="progress-fill"></div>
                    </div>
                    <span class="progress-text">0 / 4 выполнено</span>
                </div>
                <div class="checklist-container" data-platform="tt">
                    <div class="checklist-item" data-step-id="tt-1">
                        <input type="checkbox" id="tt-1">
                        <label for="tt-1">Установите надёжный пароль</label>
                    </div>
                    <div class="checklist-item" data-step-id="tt-2">
                        <input type="checkbox" id="tt-2">
                        <label for="tt-2">Включите двухфакторную аутентификацию (2FA)</label>
                    </div>
                    <div class="checklist-item" data-step-id="tt-3">
                        <input type="checkbox" id="tt-3">
                        <label for="tt-3">Настройте приватность аккаунта</label>
                    </div>
                    <div class="checklist-item" data-step-id="tt-4">
                        <input type="checkbox" id="tt-4">
                        <label for="tt-4">Проверьте активные сеансы</label>
                    </div>
                </div>
                <div class="page-action">
                    <button id="finishChecklist" class="btn-header btn-complete" disabled>Завершить</button>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-grid">
            <div>
                <p>2026 SecureSocial. Учебный проект по кибербезопасности.</p>
            </div>
            <div class="footer-links">
                <p>Источники:</p>
                <a href="https://www.tiktok.com" target="_blank" rel="noreferrer noopener">TikTok Safety</a>
            </div>
        </div>
    </footer>
    <script src="assets/js/common.js"></script>
</body>
</html>
