<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Чеклист Telegram — SecureSocial</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header>
        <div class="container nav-wrapper">
            <a href="index.html" class="logo">🛡️ <span>SecureSocial</span></a>
            <div class="nav-actions">
                <a href="tgSecure.html" class="btn-header">Назад к TG</a>
                <a href="index.html" class="back-btn">← На главную</a>
            </div>
        </div>
    </header>

    <main>
        <section class="page-header">
            <div class="container">
                <div class="platform-badge" style="--platform-color: var(--tg-color);">✈️ Telegram</div>
                <h1>Чеклист безопасности</h1>
                <p>Отмечайте пункты по мере выполнения защиты аккаунта.</p>
            </div>
        </section>

        <section class="checklist-section">
            <div class="container">
                <h2 class="section-title">TG-чеклист</h2>
                <p class="section-subtitle">Отмечайте пункты по мере выполнения.</p>
                <div class="checklist-progress"><div class="progress-bar"><div class="progress-fill"></div></div><span class="progress-text">0 / 7 выполнено</span></div>
                <div class="checklist-container" data-platform="tg">
                    <div class="checklist-item" data-step-id="tg-1"><input type="checkbox" id="tg-1"><label for="tg-1">Установите код-пароль</label></div>
                    <div class="checklist-item" data-step-id="tg-2"><input type="checkbox" id="tg-2"><label for="tg-2">Включите облачный пароль (2FA)</label></div>
                    <div class="checklist-item" data-step-id="tg-3"><input type="checkbox" id="tg-3"><label for="tg-3">Проверьте активные сеансы</label></div>
                    <div class="checklist-item" data-step-id="tg-4"><input type="checkbox" id="tg-4"><label for="tg-4">Скройте номер телефона</label></div>
                    <div class="checklist-item" data-step-id="tg-5"><input type="checkbox" id="tg-5"><label for="tg-5">Ограничьте фото профиля</label></div>
                    <div class="checklist-item" data-step-id="tg-6"><input type="checkbox" id="tg-6"><label for="tg-6">Запретите пересылку</label></div>
                    <div class="checklist-item" data-step-id="tg-7"><input type="checkbox" id="tg-7"><label for="tg-7">Настройте автоблокировку</label></div>
                </div>
                <div class="page-action"><button id="finishChecklist" class="btn-header btn-complete" disabled>Завершить</button></div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container footer-grid">
            <div>
                <p>2026 SecureSocial. Учебный проект по кибербезопасности.</p>
            </div>
            <div class="footer-links">
                <p>Источники:</p>
                <a href="https://telegram.org" target="_blank" rel="noreferrer noopener">Telegram FAQ</a>
            </div>
        </div>
    </footer>
    <script src="assets/js/common.js"></script>
</body>
</html>
